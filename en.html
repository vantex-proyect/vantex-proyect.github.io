<section class="cta-section">
    <div class="accent-line" style="margin: 0 auto 30px; background: var(--white);"></div>
    <h2>Protect your infrastructure today.</h2>
    <p>Request a 10-minute strategic initial assessment to identify your critical vulnerabilities.</p>

    <form action="https://formspree.io/f/mlgpwdkk" method="POST" style="max-width: 600px; margin: 30px auto; display: flex; flex-direction: column; gap: 20px;">
        <input type="text" name="name" placeholder="Your Name" required style="padding: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;">
        <input type="email" name="email" placeholder="Your Email" required style="padding: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;">
        <textarea name="message" placeholder="Your Message" required rows="5" style="padding: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;"></textarea>
        <button type="submit" class="btn">Request Initial Assessment</button>
    </form>
</section>
