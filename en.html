<section class="cta-section" style="background: var(--dark); color: var(--white); text-align: center; padding: 80px 20px;">
    <div class="accent-line" style="margin: 0 auto 30px; background: var(--white);"></div>
    <h2>Request Your Strategic Assessment</h2>
    <p>Complete this form to schedule a 10-minute initial review and identify critical vulnerabilities.</p>
    
    <form action="https://formspree.io/f/mlgpwdkk" method="POST" style="max-width: 500px; margin: 40px auto; text-align: left;">
        <label for="name" style="display:block; margin-bottom:10px; font-weight:600;">Name</label>
        <input type="text" id="name" name="name" required style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ccc; border-radius:4px;">

        <label for="company" style="display:block; margin-bottom:10px; font-weight:600;">Company</label>
        <input type="text" id="company" name="company" required style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ccc; border-radius:4px;">

        <label for="email" style="display:block; margin-bottom:10px; font-weight:600;">Email</label>
        <input type="email" id="email" name="email" required style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ccc; border-radius:4px;">

        <label for="message" style="display:block; margin-bottom:10px; font-weight:600;">Message</label>
        <textarea id="message" name="message" rows="5" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ccc; border-radius:4px;"></textarea>

        <button type="submit" style="background: var(--accent); color: var(--white); padding: 15px 40px; font-weight:600; text-transform: uppercase; letter-spacing:2px; border:none; border-radius:4px; cursor:pointer;">Send</button>
    </form>
</section>
