<section class="cta-section" style="background: var(--dark); color: var(--white); text-align: center; padding: 120px 20px;">
    <div class="accent-line" style="margin: 0 auto 30px; background: var(--white);"></div>
    <h2 style="color: var(--white); margin-bottom: 20px;">Shield your infrastructure today.</h2>
    <p style="margin-bottom: 40px; opacity: 0.9;">Request a strategic initial evaluation to identify your critical vulnerabilities.</p>
    
    <form action="https://formspree.io/f/mlgpwdkk" method="POST" style="max-width: 500px; margin: 0 auto; text-align: left; background: #1a1a1a; padding: 40px; border: 1px solid var(--accent);">
        <label style="display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; color: var(--accent); font-weight: 600;">Corporate Email</label>
        <input type="email" name="email" required style="width: 100%; padding: 15px; background: #000; border: 1px solid #444; color: #fff; margin-bottom: 25px; font-family: 'Inter', sans-serif; outline: none;">
        
        <label style="display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; color: var(--accent); font-weight: 600;">Message / Critical Asset</label>
        <textarea name="message" required style="width: 100%; padding: 15px; background: #000; border: 1px solid #444; color: #fff; margin-bottom: 25px; font-family: 'Inter', sans-serif; height: 120px; resize: none; outline: none;"></textarea>
        
        <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer; display: block; background: var(--accent); color: var(--white); padding: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px;">Send Evaluation Request</button>
    </form>
</section>
