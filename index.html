<section class="cta-section" style="background: var(--dark); color: var(--white); text-align: center; padding: 80px 20px;">
    <div class="accent-line" style="margin: 0 auto 30px; background: var(--white);"></div>
    <h2>Solicite su evaluación estratégica</h2>
    <p>Complete este formulario para agendar una revisión inicial de 10 minutos y detectar vulnerabilidades críticas.</p>
    
    <form action="https://formspree.io/f/mlgpwdkk" method="POST" style="max-width: 500px; margin: 40px auto; text-align: left;">
        <label for="nombre" style="display:block; margin-bottom:10px; font-weight:600;">Nombre</label>
        <input type="text" id="nombre" name="name" required style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ccc; border-radius:4px;">

        <label for="empresa" style="display:block; margin-bottom:10px; font-weight:600;">Empresa</label>
        <input type="text" id="empresa" name="empresa" required style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ccc; border-radius:4px;">

        <label for="email" style="display:block; margin-bottom:10px; font-weight:600;">Correo electrónico</label>
        <input type="email" id="email" name="email" required style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ccc; border-radius:4px;">

        <label for="mensaje" style="display:block; margin-bottom:10px; font-weight:600;">Mensaje</label>
        <textarea id="mensaje" name="mensaje" rows="5" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ccc; border-radius:4px;"></textarea>

        <button type="submit" style="background: var(--accent); color: var(--white); padding: 15px 40px; font-weight:600; text-transform: uppercase; letter-spacing:2px; border:none; border-radius:4px; cursor:pointer;">Enviar</button>
    </form>
</section>
