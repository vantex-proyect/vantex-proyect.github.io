<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vantex | Ingeniería Operativa de Crisis & Resiliencia</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

<style>
:root {
--accent: #c5a059;
--dark: #0f0f0f;
--text: #333333;
--light: #cfe6f5;
--white: #ffffff;
--spacing-lg: 120px;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
font-family: 'Inter', sans-serif;
color: var(--text);
line-height: 1.8;
background: var(--white);
}

nav {
padding: 40px 60px;
display:flex;
justify-content:space-between;
align-items:center;
position:absolute;
width:100%;
z-index:100;
}

.logo {
font-family:'Playfair Display', serif;
font-size:22px;
font-weight:700;
letter-spacing:5px;
color:white;
text-decoration:none;
}

.lang {
font-size:12px;
letter-spacing:2px;
color:rgba(255,255,255,0.7);
}

.lang a {
color:white;
text-decoration:none;
margin:0 10px;
}

header {
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2000') center/cover;
color:white;
padding:0 20px;
}

.badge {
border:1px solid var(--accent);
color:var(--accent);
padding:8px 20px;
font-size:11px;
letter-spacing:4px;
margin-bottom:30px;
}

h1 {
font-family:'Playfair Display', serif;
font-size:clamp(40px,6vw,75px);
margin-bottom:25px;
}

section {
padding:var(--spacing-lg) 60px;
max-width:1300px;
margin:auto;
}

.bg-light {
background:var(--light);
width:100%;
}

.accent-line {
width:50px;
height:3px;
background:var(--accent);
margin-bottom:30px;
}

.grid-3 {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:40px;
}

.card {
padding:60px 40px;
background:white;
border:1px solid #ddd;
}

.cta-section {
background:var(--dark);
color:white;
padding:120px 20px;
text-align:center;
}

form {
max-width:500px;
margin:40px auto 0;
background:#1a1a1a;
padding:40px;
}

input, textarea {
width:100%;
padding:15px;
background:#000;
border:1px solid #333;
color:white;
margin-bottom:20px;
}

.btn {
width:100%;
padding:20px;
background:var(--accent);
color:white;
border:none;
cursor:pointer;
}

footer {
padding:60px;
text-align:center;
font-size:11px;
color:#999;
}
</style>
</head>

<body>

<nav>
<a href="./index.html" class="logo">VANTEX</a>
<div class="lang"><b>ES</b> | <a href="./en.html">EN</a></div>
</nav>

<header>
<div class="badge">Estrategia en Resiliencia Operativa de Élite</div>
<h1>Donde la mayoría ve continuidad, nosotros detectamos el fallo operativo.</h1>
</header>

<div class="cta-section">
<h2>Blinde su infraestructura hoy.</h2>

<form action="https://formspree.io/f/mlgpwdkk" method="POST">
<input type="email" name="email" placeholder="Email corporativo" required>
<textarea name="message" placeholder="Activo crítico / mensaje" required></textarea>
<button class="btn">Enviar Solicitud</button>
</form>

</div>

<footer>VANTEX PROJECT © 2026</footer>

</body>
</html>
