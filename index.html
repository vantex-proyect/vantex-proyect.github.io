<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantex | Ingeniería Operativa de Crisis & Resiliencia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #c5a059;
            --dark: #0f0f0f;
            --text: #333333;
            --light: #f4f4f4;
            --white: #ffffff;
            --spacing-lg: 120px;
            --spacing-md: 60px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--text); line-height: 1.8; background: var(--white); -webkit-font-smoothing: antialiased; }

        /* Navigation */
        nav { padding: 40px 60px; display: flex; justify-content: space-between; align-items: center; position: absolute; width: 100%; z-index: 100; }
        .logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; letter-spacing: 5px; color: var(--white); text-decoration: none; }
        .lang { font-size: 12px; letter-spacing: 2px; color: rgba(255,255,255,0.7); }
        .lang a { color: var(--white); text-decoration: none; margin: 0 10px; transition: 0.3s; }
        .lang a:hover { color: var(--accent); }

        /* Hero Section */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2000') center/cover no-repeat;
            color: var(--white);
            padding: 0 20px;
        }
        .badge { border: 1px solid var(--accent); color: var(--accent); padding: 8px 20px; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; font-weight: 600; }
        header h1 { font-family: 'Playfair Display', serif; font-size: clamp(40px, 6vw, 75px); line-height: 1.1; margin-bottom: 25px; max-width: 1100px; }
        header p { font-size: clamp(18px, 2.5vw, 24px); font-weight: 300; max-width: 800px; opacity: 0.9; margin-bottom: 40px; }
        .hero-statement { font-style: italic; font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--accent); letter-spacing: 1px; }

        /* Layout */
        section { padding: var(--spacing-lg) 60px; max-width: 1300px; margin: 0 auto; }
        .bg-light { background-color: #cfe6f5; max-width: 100%; } /* Azul cielo intenso solicitado */
        .accent-line { width: 50px; height: 3px; background: var(--accent); margin-bottom: 30px; }
        h2 { font-family: 'Playfair Display', serif; font-size: clamp(32px, 4vw, 52px); color: var(--dark); margin-bottom: 50px; line-height: 1.2; }

        /* Problem Section */
        .problem-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
        .problem-text p { font-size: 20px; color: var(--dark); margin-bottom: 30px; }
        .problem-text strong { color: var(--accent); }
        .impact-box { padding: 50px; background: var(--dark); color: var(--white); border-left: 6px solid var(--accent); }
        .impact-box h3 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 20px; }

        /* Value Prop */
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; margin-top: 50px; }
        .card {
            padding: 60px 40px;
            background: var(--white);
            border: 1px solid #ddd; /* Borde más visible solicitado */
            box-shadow: 0 15px 30px rgba(0,0,0,0.05); /* Sombra para resaltar solicitado */
            transition: 0.4s ease;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .card h3 { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 20px; color: var(--dark); }
        .card p { font-size: 16px; color: #666; }

        /* Authority / Direction */
        .direction-section { display: grid; grid-template-columns: 0.8fr 1.2fr; gap: 60px; align-items: center; }
        .dir-image { width: 100%; height: 500px; background: #ddd url('https://images.unsplash.com/photo-1507679799987-c73779587ccf?q=80&w=2071') center/cover; filter: grayscale(100%); }
        .dir-text h2 { margin-bottom: 10px; }
        .dir-title { color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; font-size: 14px; margin-bottom: 30px; display: block; }

        /* Contexts / Sectors */
        .sectors { text-align: center; padding: 80px 60px; border-top: 1px solid #eee; }
        .sectors-list { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; opacity: 0.5; font-weight: 600; letter-spacing: 2px; font-size: 13px; }

        /* CTA */
        .cta-section { background: var(--dark); color: var(--white); text-align: center; padding: 120px 20px; }
        .cta-section h2 { color: var(--white); border: none; margin-bottom: 20px; }
        .btn { display: inline-block; padding: 22px 50px; background: var(--accent); color: var(--white); text-decoration: none; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; font-size: 13px; transition: 0.3s; margin-top: 30px; }
        .btn:hover { background: #b08d4a; transform: translateY(-3px); }

        /* Footer */
        footer { padding: 60px; text-align: center; font-size: 11px; letter-spacing: 2px; color: #999; text-transform: uppercase; }

        @media (max-width: 900px) {
            nav { padding: 20px; }
            section { padding: 80px 20px; }
            .problem-grid,
