<div class="cta-section">
    <div class="accent-line" style="margin: 0 auto 30px; background: var(--white);"></div>
    <h2>Blinde su infraestructura hoy.</h2>
    <p style="margin-bottom: 40px;">Solicite una evaluación inicial estratégica para identificar sus vulnerabilidades críticas.</p>
    
    <form action="https://formspree.io/f/mlgpwdkk" method="POST" style="max-width: 500px; margin: 0 auto; text-align: left; background: rgba(255,255,255,0.05); padding: 30px; border: 1px solid rgba(197, 160, 89, 0.3);">
        <label style="display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; color: var(--accent);">Email Corporativo</label>
        <input type="email" name="email" required style="width: 100%; padding: 12px; background: transparent; border: 1px solid #444; color: white; margin-bottom: 20px; font-family: 'Inter', sans-serif;">
        
        <label style="display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; color: var(--accent);">Mensaje / Activo Crítico</label>
        <textarea name="message" required style="width: 100%; padding: 12px; background: transparent; border: 1px solid #444; color: white; margin-bottom: 20px; font-family: 'Inter', sans-serif; height: 100px; resize: none;"></textarea>
        
        <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer; display: block;">Enviar Solicitud de Evaluación</button>
    </form>
</div>
