<section class="cta-section">
    <div class="accent-line" style="margin: 0 auto 30px; background: var(--white);"></div>
    <h2>Blinde su infraestructura hoy.</h2>
    <p>Solicite una evaluación inicial estratégica de 10 minutos para identificar sus vulnerabilidades críticas.</p>

    <form action="https://formspree.io/f/mlgpwdkk" method="POST" style="max-width: 600px; margin: 30px auto; display: flex; flex-direction: column; gap: 20px;">
        <input type="text" name="name" placeholder="Su Nombre" required style="padding: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;">
        <input type="email" name="email" placeholder="Su Correo Electrónico" required style="padding: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;">
        <textarea name="message" placeholder="Su Mensaje" required rows="5" style="padding: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;"></textarea>
        <button type="submit" class="btn">Solicitar Evaluación Inicial</button>
    </form>
</section>
